{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/manage_schemes.css') }}">

<div class="container">

    <div class="header">
        <h2>🌸 Scheme Management</h2>
        <a href="{{ url_for('add_scheme') }}" class="btn add-btn">+ Add Scheme</a>
    </div>

    <table>
        <tr>
            <th>ID</th>
            <th>Scheme Name</th>
            <th>Description</th>
            <th>Actions</th>
        </tr>

        {% for scheme in schemes %}
        <tr>
            <td>{{ scheme.id }}</td>
            <td>{{ scheme.scheme_name }}</td>
            <td>{{ scheme.description }}</td>
            <td>
                <a href="{{ url_for('edit_scheme', id=scheme.id) }}" class="btn edit-btn">Edit</a>
                <a href="{{ url_for('delete_scheme', id=scheme.id) }}" class="btn delete-btn"
                   onclick="return confirm('Delete this scheme?')">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

{% endblock %}
