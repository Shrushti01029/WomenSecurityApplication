{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/scheme_form.css') }}">

<div class="form-container">

    <a href="{{ url_for('manage_schemes') }}">⬅ Back</a>

    <h2>➕ Add New Scheme</h2>

    <form method="POST">
        <input type="text" name="scheme_name" placeholder="Enter Scheme Name" required>
        <textarea name="description" placeholder="Enter Description" required></textarea>
        <button type="submit">Add Scheme</button>
    </form>

</div>

{% endblock %}
